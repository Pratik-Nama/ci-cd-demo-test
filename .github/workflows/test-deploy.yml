name: 🧪 Test CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - env: dev-india
            branch: dev

          - env: dev-canada
            branch: dev

          - env: demo-india
            branch: dev

          - env: prod-india
            branch: main

          - env: prod-canada
            branch: main

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 📦 Build Project
        run: mvn clean package -DskipTests

      # ✅ Branch filtering logic (IMPORTANT TEST)
      - name: 🚫 Skip if branch mismatch
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          if [[ "$BRANCH" != "${{ matrix.branch }}" ]]; then
            echo "❌ Skipping ${{ matrix.env }} (branch mismatch)"
            exit 0
          fi

      # ✅ Simulated Deploy (instead of Azure)
      - name: 🚀 Simulated Deploy
        run: |
          echo "✅ Deploying to ${{ matrix.env }}"
