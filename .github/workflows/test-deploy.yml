name: 🧪 Test CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - env: dev-india
            branch: dev

          - env: dev-canada
            branch: dev

          - env: demo-india
            branch: dev

          - env: prod-india
            branch: main

          - env: prod-canada
            branch: main

    # ✅ Correct job-level condition (AFTER matrix)
    if: github.ref_name == matrix.branch

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 📦 Build Project
        run: mvn clean package -DskipTests

      # 🔍 Optional Debug (recommended)
      - name: 🔍 Debug Info
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Matrix Branch: ${{ matrix.branch }}"
          echo "Environment: ${{ matrix.env }}"

      # ✅ Simulated Deploy
      - name: 🚀 Simulated Deploy
        run: |
          echo "✅ Deploying to ${{ matrix.env }}"
