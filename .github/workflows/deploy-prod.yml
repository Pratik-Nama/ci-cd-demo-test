name: 🚀 Deploy PRODUCTION

# Shows selected region in the workflow run title
run-name: Prod Deploy → ${{ inputs.target_region }}

on:
  workflow_dispatch:
    inputs:
      target_region:
        description: "Select the production region to deploy to"
        required: true
        type: choice
        options:
          - india
          - canada
          # Add more regions here when you need them
          # - usa
          # - uk
          # - australia
          # - germany
          # - singapore
        default: india

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-and-prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Show selected region
        run: |
          echo "Deployment target: ${{ inputs.target_region }}"

  deploy:
    runs-on: ubuntu-latest
    needs: validate-and-prepare
    environment: production-${{ inputs.target_region }}   # e.g. production-india, production-canada
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: Determine deployment details
        id: details
        run: |
          case "${{ inputs.target_region }}" in
            india)
              echo "display_name=Production India" >> $GITHUB_OUTPUT
              echo "region_short=india" >> $GITHUB_OUTPUT
              ;;
            canada)
              echo "display_name=Production Canada" >> $GITHUB_OUTPUT
              echo "region_short=canada" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown region: ${{ inputs.target_region }}"
              exit 1
              ;;
          esac

      - name: 🚀 Deploy to ${{ steps.details.outputs.display_name }}
        env:
          REGION: ${{ steps.details.outputs.region_short }}
        run: |
          echo ""
          echo "=============================================================="
          echo "🚀 DEPLOYMENT STARTED → Region: ${{ steps.details.outputs.display_name }}"
          echo "=============================================================="
          echo ""

          # ── Replace with your actual deployment commands ──
          echo "Deploying to production-${REGION} ..."
          # aws deploy create-deployment --application-name my-app --deployment-group-name prod-${REGION} ...
          # kubectl apply -k k8s/overlays/${REGION}
          # az webapp deploy --resource-group rg-${REGION} --name amplifi-prod-${REGION} ...
          sleep 3   # ← just for demo

          echo ""
          echo "=============================================================="
          echo "✅ DEPLOYMENT FINISHED SUCCESSFULLY → Region: ${{ steps.details.outputs.display_name }}"
          echo "=============================================================="

  summary:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: 📊 Deployment Summary
        run: |
          echo ""
          echo "=============================================================="
          echo "           FINAL DEPLOYMENT SUMMARY"
          echo "=============================================================="

          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "✅ ${{ inputs.target_region }} → Deployed successfully"
          elif [[ "${{ needs.deploy.result }}" == "skipped" ]]; then
            echo "⏭️ ${{ inputs.target_region }} → Skipped"
          else
            echo "❌ ${{ inputs.target_region }} → Failed or cancelled"
          fi

          echo ""
          echo "Selected region: ${{ inputs.target_region }}"
          echo "=============================================================="
