name: 🚀 Deploy PROD

on:
  workflow_dispatch:
    inputs:
      prod_india:
        description: "Deploy to prod-india?"
        type: choice
        options: [no, yes]
        default: no

      prod_canada:
        description: "Deploy to prod-canada?"
        type: choice
        options: [no, yes]
        default: no

jobs:

  deploy-prod-india:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.prod_india == 'yes' }}

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy prod-india
        run: echo "✅ Deploying to prod-india"

  deploy-prod-canada:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.prod_canada == 'yes' }}

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy prod-canada
        run: echo "✅ Deploying to prod-canada"
