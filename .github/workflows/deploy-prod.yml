name: 🚀 Deploy PRODUCTION

on:
  workflow_dispatch:
    inputs:
      prod_india:
        description: "Deploy to Production India?"
        required: true
        type: choice
        options:
          - 'No'
          - 'Yes'
        default: 'No'
      prod_canada:
        description: "Deploy to Production Canada?"
        required: true
        type: choice
        options:
          - 'No'
          - 'Yes'
        default: 'No'
      # ── Add more regions here when needed (up to ~20-22 inputs max) ──
      # prod_usa:
      #   description: "Deploy to Production USA?"
      #   required: true
      #   type: choice
      #   options: [ 'No', 'Yes' ]
      #   default: 'No'

  # Optional: auto-trigger on tags (like your second example)
  # push:
  #   tags: [ 'v[0-9]+.[0-9]+.[0-9]+*' ]

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: ❌ Fail if nothing selected
        run: |
          if [[ "${{ inputs.prod_india }}" == 'No' && "${{ inputs.prod_canada }}" == 'No' ]]; then
            # Add more conditions when you add more regions
            # && "${{ inputs.prod_usa }}" == 'No'
            echo "❌ Please select at least one region to deploy!"
            exit 1
          fi

      - name: Show selected regions
        run: |
          echo "Selected deployments:"
          echo "  India  : ${{ inputs.prod_india }}"
          echo "  Canada : ${{ inputs.prod_canada }}"
          # echo "  USA    : ${{ inputs.prod_usa }}"

  # ── India deployment job ────────────────────────────────────────
  deploy-prod-india:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ inputs.prod_india == 'Yes' }}
    environment: production-india          # ← Uncomment when you create this environment
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Production India
        run: |
          echo "✅ Starting deployment to prod-india..."
          # ── Your real deploy commands go here ──
          # aws deploy create-deployment --application-name ... --region ap-south-1
          # kubectl apply -k k8s/overlays/india
          # az webapp deploy --resource-group rg-india --name amplifi-prod-india ...
          echo "Deployment complete for prod-india 🎉"

  # ── Canada deployment job ───────────────────────────────────────
  deploy-prod-canada:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ inputs.prod_canada == 'Yes' }}
    environment: production-canada         # ← Uncomment when you create this environment
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Production Canada
        run: |
          echo "✅ Starting deployment to prod-canada..."
          # ── Your real deploy commands go here ──
          # aws deploy create-deployment --application-name ... --region ca-central-1
          # kubectl apply -k k8s/overlays/canada
          echo "Deployment complete for prod-canada 🎉"

  # ── Example: how to add more jobs later ──────────────────────────
  # deploy-prod-usa:
  #   runs-on: ubuntu-latest
  #   needs: validate
  #   if: ${{ inputs.prod_usa == 'Yes' }}
  #   environment: production-usa
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Deploy to USA
  #       run: echo "Deploying to prod-usa..."
