name: 🚀 Deploy PROD

on:
  # ✅ Manual trigger
  workflow_dispatch:
    inputs:
      prod_india:
        description: "Deploy to prod-india?"
        type: choice
        options: [no, yes]
        default: no

      prod_canada:
        description: "Deploy to prod-canada?"
        type: choice
        options: [no, yes]
        default: no

  # ✅ Auto trigger on push to main
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - env: prod-india
            input: prod_india

          - env: prod-canada
            input: prod_canada

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Debug Trigger
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"

      - name: 🚀 Deploy PROD
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs[matrix.input] == 'yes')
        run: |
          echo "✅ Deploying to ${{ matrix.env }}"
