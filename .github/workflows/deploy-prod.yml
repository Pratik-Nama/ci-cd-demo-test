name: 🚀 Deploy PRODUCTION

on:
  workflow_dispatch:
    inputs:
      target_region:
        description: "Select Production Region to Deploy"
        required: true
        type: choice
        options:
          - india
          - canada
          # Add more regions here when needed
          # - usa
          # - uk
          # - australia
          # - germany
        default: india

  # Optional: auto-deploy on version tags (like your Amplifi example)
  # push:
  #   tags: [ 'v[0-9]+.[0-9]+.[0-9]+*' ]

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Show selected region
        run: |
          echo "Deploying to: ${{ inputs.target_region }}"

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment: production-${{ inputs.target_region }}   # creates production-india, production-canada, etc.
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: Determine deployment target
        id: target
        run: |
          case "${{ inputs.target_region }}" in
            india)
              echo "region=india" >> $GITHUB_OUTPUT
              echo "display_name=Production India" >> $GITHUB_OUTPUT
              # echo "dockerfile=./k8s/india.Dockerfile" >> $GITHUB_OUTPUT   # if needed
              ;;
            canada)
              echo "region=canada" >> $GITHUB_OUTPUT
              echo "display_name=Production Canada" >> $GITHUB_OUTPUT
              ;;
            # Add cases for more regions
            *)
              echo "Unknown region: ${{ inputs.target_region }}"
              exit 1
              ;;
          esac

      - name: 🚀 Deploy to ${{ steps.target.outputs.display_name }}
        env:
          REGION: ${{ steps.target.outputs.region }}
        run: |
          echo "Starting deployment to production-${REGION} ..."
          echo "✅ Real deploy commands go here"
          # aws deploy create-deployment --application-name my-app --deployment-group-name prod-${REGION} ...
          # kubectl apply -k k8s/overlays/${REGION}
          # az webapp deploy --name amplifi-prod-${REGION} ...
          echo "Deployment complete for production-${REGION} 🎉"
