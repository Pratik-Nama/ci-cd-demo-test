name: 🚀 Deploy PROD

on:
  workflow_dispatch:
    inputs:
      prod_india:
        description: "Deploy to prod-india?"
        required: true
        type: choice
        options:
          - no
          - yes
        default: no

      prod_canada:
        description: "Deploy to prod-canada?"
        required: true
        type: choice
        options:
          - no
          - yes
        default: no

jobs:

  # ✅ Validation (prevents selecting none)
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: ❌ Fail if nothing selected
        run: |
          if [[ "${{ github.event.inputs.prod_india }}" == "no" && "${{ github.event.inputs.prod_canada }}" == "no" ]]; then
            echo "❌ Please select at least one instance"
            exit 1
          fi

  # ✅ Deploy INDIA
  deploy-prod-india:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.inputs.prod_india == 'yes' }}

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy prod-india
        run: |
          echo "✅ Deploying to prod-india"

  # ✅ Deploy CANADA
  deploy-prod-canada:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event.inputs.prod_canada == 'yes' }}

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy prod-canada
        run: |
          echo "✅ Deploying to prod-canada"
